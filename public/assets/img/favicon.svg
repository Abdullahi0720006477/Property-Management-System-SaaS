<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Simplified building for favicon - bold and recognizable at small sizes -->
  <!-- Main building -->
  <rect x="1" y="3" width="8" height="12" rx="1" fill="#1B2A4A"/>
  <!-- Right wing -->
  <rect x="10" y="6" width="5" height="9" rx="1" fill="#1B2A4A" opacity="0.85"/>
  <!-- Windows (simplified) -->
  <rect x="3" y="5" width="2" height="1.5" rx="0.3" fill="#F59E0B"/>
  <rect x="6" y="5" width="2" height="1.5" rx="0.3" fill="#F59E0B"/>
  <rect x="3" y="8" width="2" height="1.5" rx="0.3" fill="#F59E0B" opacity="0.8"/>
  <rect x="6" y="8" width="2" height="1.5" rx="0.3" fill="#F59E0B" opacity="0.8"/>
  <rect x="3" y="11" width="2" height="1.5" rx="0.3" fill="#F59E0B" opacity="0.6"/>
  <rect x="6" y="11" width="2" height="1.5" rx="0.3" fill="#F59E0B" opacity="0.6"/>
  <!-- Connection nodes (bold for favicon visibility) -->
  <circle cx="1.5" cy="3" r="1.5" fill="#F59E0B"/>
  <circle cx="9" cy="3" r="1.5" fill="#F59E0B"/>
  <circle cx="14.5" cy="6" r="1.5" fill="#F59E0B"/>
  <!-- Connection line -->
  <line x1="3" y1="3" x2="7.5" y2="3" stroke="#F59E0B" stroke-width="0.8" opacity="0.6"/>
</svg>