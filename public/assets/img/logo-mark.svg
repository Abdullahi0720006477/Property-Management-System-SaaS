<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <g transform="translate(2, 2)">
    <!-- Main building body -->
    <rect x="4" y="8" width="14" height="28" rx="1.5" fill="#1B2A4A"/>
    <!-- Right wing -->
    <rect x="20" y="14" width="10" height="22" rx="1.5" fill="#1B2A4A" opacity="0.8"/>
    <!-- Windows on main building -->
    <rect x="7" y="12" width="3.5" height="3" rx="0.5" fill="#F59E0B" opacity="0.9"/>
    <rect x="12" y="12" width="3.5" height="3" rx="0.5" fill="#F59E0B" opacity="0.9"/>
    <rect x="7" y="18" width="3.5" height="3" rx="0.5" fill="#F59E0B" opacity="0.7"/>
    <rect x="12" y="18" width="3.5" height="3" rx="0.5" fill="#F59E0B" opacity="0.7"/>
    <rect x="7" y="24" width="3.5" height="3" rx="0.5" fill="#F59E0B" opacity="0.5"/>
    <rect x="12" y="24" width="3.5" height="3" rx="0.5" fill="#F59E0B" opacity="0.5"/>
    <!-- Windows on right wing -->
    <rect x="23" y="18" width="3" height="2.5" rx="0.5" fill="#F59E0B" opacity="0.7"/>
    <rect x="23" y="23" width="3" height="2.5" rx="0.5" fill="#F59E0B" opacity="0.5"/>
    <!-- Connection nodes -->
    <circle cx="4" cy="8" r="2" fill="#F59E0B"/>
    <circle cx="18" cy="8" r="2" fill="#F59E0B"/>
    <circle cx="30" cy="14" r="2" fill="#F59E0B"/>
    <circle cx="30" cy="36" r="1.5" fill="#F59E0B" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="6" y1="8" x2="16" y2="8" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
    <line x1="19.5" y1="9.5" x2="28.5" y2="14" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
    <line x1="30" y1="16" x2="30" y2="34.5" stroke="#F59E0B" stroke-width="0.6" opacity="0.3" stroke-dasharray="2 1.5"/>
  </g>
